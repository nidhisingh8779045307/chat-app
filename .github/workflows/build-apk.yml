name: Build Android APK

# Runs whenever you push to main, or manually from the Actions tab
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build web app
        working-directory: frontend
        # Set VITE_SERVER_URL as a GitHub Actions secret/variable once your
        # backend is deployed, e.g.: VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
        run: npm run build

      - name: Sync Capacitor Android project
        working-directory: frontend
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
